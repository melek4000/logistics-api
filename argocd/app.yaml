apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logistics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/melek4000/logistics-api.git
    path: k8s/base
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
