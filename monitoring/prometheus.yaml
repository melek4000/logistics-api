# monitoring/prometheus.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'kubernetes'
        static_configs:
          - targets: ['kubernetes.default.svc:443']

      - job_name: 'gateway'
        static_configs:
          - targets: ['gateway-svc:80']
